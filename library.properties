name=ModbusResponder
version=1.0.0
author=Levi Monte
maintainer=Levi Monte
sentence=Minimal Modbus TCP responder that serves holding registers to a PLC or SCADA master.
paragraph=A tiny, dependency-free implementation of Read Holding Registers (Modbus function code 0x03) over TCP, built directly against the Modbus Application Protocol spec. It is header-only and agnostic about where register values come from, making it well suited to resource-constrained boards where a full Modbus library's RAM and flash overhead is not justified for a single function code. Works with any Ethernet or WiFi transport that exposes the Arduino Client interface.
category=Communication
url=https://github.com/LeviMonte/ArduinoRemoteIO
architectures=*
includes=ModbusResponder.h
